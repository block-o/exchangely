env: development
http_addr: ":8080"
role: all
database_url: postgres://postgres:postgres@localhost:5432/exchangely?sslmode=disable
kafka:
  brokers:
    - localhost:9092
  tasks_topic: exchangely.tasks
  market_ticks_topic: exchangely.market.ticks
  consumer_group: exchangely-workers
planner:
  lease_name: planner_leader
  lease_ttl: 15s
  tick: 10s
worker:
  poll_interval: 5s
  batch_size: 8
integrity:
  min_sources: 2
  max_divergence_pct: 0.5
assets:
  quote_assets:
    - EUR
    - USDT
