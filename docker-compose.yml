version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: exchangely-timescaledb
    environment:
      POSTGRES_DB: exchangely
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./deploy/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exchangely"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: exchangely-kafka
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: exchangely-backend
    environment:
      BACKEND_HTTP_ADDR: ${BACKEND_HTTP_ADDR:-:8080}
      BACKEND_ENV: ${BACKEND_ENV:-development}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-debug}
      BACKEND_ROLE: ${BACKEND_ROLE:-all}
      BACKEND_DATABASE_URL: ${BACKEND_DATABASE_URL:-postgres://postgres:postgres@timescaledb:5432/exchangely?sslmode=disable}
      BACKEND_KAFKA_BROKERS: ${BACKEND_KAFKA_BROKERS:-kafka:9092}
      BACKEND_KAFKA_TOPIC_TASKS: ${BACKEND_KAFKA_TOPIC_TASKS:-exchangely.tasks}
      BACKEND_KAFKA_TOPIC_MARKET_TICKS: ${BACKEND_KAFKA_TOPIC_MARKET_TICKS:-exchangely.market.ticks}
      BACKEND_KAFKA_CONSUMER_GROUP: ${BACKEND_KAFKA_CONSUMER_GROUP:-exchangely-workers}
      BACKEND_PLANNER_LEASE_NAME: ${BACKEND_PLANNER_LEASE_NAME:-planner_leader}
      BACKEND_PLANNER_LEASE_TTL: ${BACKEND_PLANNER_LEASE_TTL:-15s}
      BACKEND_PLANNER_TICK: ${BACKEND_PLANNER_TICK:-10s}
      BACKEND_WORKER_POLL_INTERVAL: ${BACKEND_WORKER_POLL_INTERVAL:-5s}
      BACKEND_WORKER_BATCH_SIZE: ${BACKEND_WORKER_BATCH_SIZE:-8}
      BACKEND_DEFAULT_QUOTE_ASSETS: ${BACKEND_DEFAULT_QUOTE_ASSETS:-EUR,USDT}
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api/v1
    container_name: exchangely-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  timescaledb-data:
