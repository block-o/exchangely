openapi: 3.0.3
info:
  title: Exchangely API
  version: 0.1.0
  description: REST API for Exchangely market data and sync state.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/health:
    get:
      summary: Health status
      responses:
        "200":
          description: Service health
  /api/v1/assets:
    get:
      summary: List supported assets
      responses:
        "200":
          description: Asset catalog
  /api/v1/pairs:
    get:
      summary: List supported pairs
      responses:
        "200":
          description: Pair catalog
  /api/v1/historical/{pair}:
    get:
      summary: Historical OHLCV data
      parameters:
        - in: path
          name: pair
          required: true
          schema:
            type: string
        - in: query
          name: interval
          required: true
          schema:
            type: string
            enum: [1h, 1d]
        - in: query
          name: start_time
          schema:
            type: integer
            format: int64
        - in: query
          name: end_time
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Historical candle data
  /api/v1/ticker/{pair}:
    get:
      summary: Latest ticker view
      parameters:
        - in: path
          name: pair
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Latest ticker
  /api/v1/system/sync-status:
    get:
      summary: Backfill progress
      responses:
        "200":
          description: Sync status snapshot
