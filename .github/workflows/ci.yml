name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: make frontend-install
      - name: Run frontend checks
        run: make frontend-check

  backend:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: ./backend/go.sum
      - name: Ensure go fmt
        run: make backend-fmt-check
      - name: Run go vet
        run: make backend-vet
      - name: Build backend
        run: make backend-build
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m
      - name: Run tests
        run: cd backend && go test -v -race ./...

  e2e:
    name: End-to-End Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Compose Smoke Tests
        run: make e2e
