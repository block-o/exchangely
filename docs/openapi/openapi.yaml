openapi: 3.0.3
info:
  title: Exchangely API
  version: 0.1.0
  description: REST API for Exchangely market data and sync state. Github (https://github.com/block-o/exchangely)
servers:
  - url: http://localhost:8080
paths:
  /api/v1/health:
    get:
      summary: Health status
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /api/v1/assets:
    get:
      summary: List supported assets
      responses:
        "200":
          description: Asset catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
  /api/v1/pairs:
    get:
      summary: List supported pairs
      responses:
        "200":
          description: Pair catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pair'
  /api/v1/historical/{pair}:
    get:
      summary: Historical OHLCV data
      description: Returns canonical stored candles for the requested interval. Use this endpoint for historical charts and backfilled series, not for the freshest live price.
      parameters:
        - in: path
          name: pair
          required: true
          schema:
            type: string
        - in: query
          name: interval
          required: true
          schema:
            type: string
            enum: [1h, 1d]
        - in: query
          name: start_time
          schema:
            type: integer
            format: int64
        - in: query
          name: end_time
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Historical candle data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Candle'
  /api/v1/tickers:
    get:
      summary: Latest realtime ticker views
      description: Returns the freshest persisted ticker point for every pair. Results are cached in-memory with a time-based expiration (default 30s) to reduce database load. This global cache is not evicted by individual ticker updates.
      responses:
        "200":
          description: Latest tickers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ticker'
  /api/v1/tickers/stream:
    get:
      summary: Realtime ticker SSE stream
      description: Streams the same ticker read model as /api/v1/tickers, including freshest persisted realtime prices plus 24h stats.
      responses:
        "200":
          description: Server-Sent Events stream
  /api/v1/ticker/{pair}:
    get:
      summary: Latest realtime ticker view
      description: Returns the freshest persisted ticker point for a pair. Price and last_update_unix prefer the newest realtime raw sample when it is newer than the current hourly candle. Results are cached in-memory and invalidated per-ticker upon data updates.
      parameters:
        - in: path
          name: pair
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Latest ticker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticker'
  /api/v1/news:
    get:
      summary: List latest news
      description: Returns a list of curated market news fetched from RSS sources.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of news items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NewsItem"
  /api/v1/news/stream:
    get:
      summary: Realtime news SSE stream
      description: Notifies subscribers via full list push whenever new news items are ingested.
      responses:
        "200":
          description: Server-Sent Events stream
  /api/v1/system/sync-status:
    get:
      summary: Backfill progress
      responses:
        "200":
          description: Sync status snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SyncStatus'
  /api/v1/system/version:
    get:
      summary: Runtime version metadata
      responses:
        "200":
          description: Version snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version: { type: string }
  /api/v1/system/tasks:
    get:
      summary: Task queue snapshot
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: type
          schema:
            type: string
          description: Comma-separated list of task types to filter by
        - in: query
          name: status
          schema:
            type: string
          description: Comma-separated list of statuses to filter by
      responses:
        "200":
          description: Upcoming and recent tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  upcoming: { type: array, items: { $ref: '#/components/schemas/Task' } }
                  upcomingTotal: { type: integer }
                  recent: { type: array, items: { $ref: '#/components/schemas/Task' } }
                  recentTotal: { type: integer }
  /api/v1/system/tasks/stream:
    get:
      summary: Realtime task SSE stream
      responses:
        "200":
          description: Server-Sent Events stream
  /api/v1/system/warnings:
    get:
      summary: Active system warnings
      responses:
        "200":
          description: List of active warnings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActiveWarning'
    post:
      summary: Dismiss a warning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                fingerprint:
                  type: string
              required: [id, fingerprint]
      responses:
        "204":
          description: Warning dismissed
components:
  schemas:
    Asset:
      type: object
      properties:
        symbol: { type: string }
        name: { type: string }
        type: { type: string }
        circulating_supply: { type: number, format: float }
    Pair:
      type: object
      properties:
        base: { type: string }
        quote: { type: string }
        symbol: { type: string }
    Candle:
      type: object
      properties:
        pair: { type: string }
        interval: { type: string }
        timestamp: { type: integer, format: int64 }
        open: { type: number, format: double }
        high: { type: number, format: double }
        low: { type: number, format: double }
        close: { type: number, format: double }
        volume: { type: number, format: double }
        source: { type: string }
        finalized: { type: boolean }
    Ticker:
      type: object
      properties:
        pair: { type: string }
        price: { type: number, format: double }
        market_cap: { type: number, format: double }
        variation_24h: { type: number, format: double }
        high_24h: { type: number, format: double }
        low_24h: { type: number, format: double }
        last_update_unix: { type: integer, format: int64 }
        source: { type: string }
    Task:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        pair: { type: string }
        interval: { type: string }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        status: { type: string }
        last_error: { type: string }
        completed_at: { type: string, format: date-time }
    SyncStatus:
      type: object
      properties:
        pair: { type: string }
        backfill_completed: { type: boolean }
        last_synced_unix: { type: integer, format: int64 }
        next_target_unix: { type: integer, format: int64 }
        hourly_backfill_completed: { type: boolean }
        daily_backfill_completed: { type: boolean }
        hourly_synced_unix: { type: integer, format: int64 }
        daily_synced_unix: { type: integer, format: int64 }
        next_hourly_target_unix: { type: integer, format: int64 }
        next_daily_target_unix: { type: integer, format: int64 }
    HealthStatus:
      type: object
      properties:
        status: { type: string }
        checks:
          type: object
          additionalProperties: { type: string }
        timestamp: { type: integer, format: int64 }
    ActiveWarning:
      type: object
      properties:
        id: { type: string }
        level: { type: string }
        title: { type: string }
        detail: { type: string }
        fingerprint: { type: string }
    NewsItem:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        link: { type: string }
        source: { type: string }
        published_at: { type: string, format: date-time }
