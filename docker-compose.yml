services:
  timescaledb:
    image: timescale/timescaledb:2.26.1-pg18
    container_name: exchangely-timescaledb
    environment:
      POSTGRES_DB: exchangely
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./deploy/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exchangely"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.1.2
    container_name: exchangely-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: apache/kafka:4.1.2
    container_name: exchangely-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVER: kafka:9092
    volumes:
      - ./deploy/kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/sh", "/init-topics.sh"]

  backend:
    build:
      context: ./backend
    container_name: exchangely-backend
    develop:
      watch:
        - action: rebuild
          path: ./backend
          ignore:
            - "**/*_test.go"
            - ".cache/"
            - "*.out"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080/api/v1}
      BACKEND_HTTP_ADDR: ${BACKEND_HTTP_ADDR:-:8080}
      BACKEND_ENV: ${BACKEND_ENV:-development}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      BACKEND_ROLE: ${BACKEND_ROLE:-all}
      BACKEND_CORS_ALLOWED_ORIGINS: ${BACKEND_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      BACKEND_DATABASE_URL: ${BACKEND_DATABASE_URL:-postgres://postgres:postgres@timescaledb:5432/exchangely?sslmode=disable}
      BACKEND_KAFKA_BROKERS: ${BACKEND_KAFKA_BROKERS:-kafka:9092}
      BACKEND_KAFKA_TOPIC_TASKS: ${BACKEND_KAFKA_TOPIC_TASKS:-exchangely.tasks}
      BACKEND_KAFKA_TOPIC_MARKET_TICKS: ${BACKEND_KAFKA_TOPIC_MARKET_TICKS:-exchangely.market.ticks}
      BACKEND_KAFKA_CONSUMER_GROUP: ${BACKEND_KAFKA_CONSUMER_GROUP:-exchangely-workers}
      BACKEND_ENABLE_BINANCE: ${BACKEND_ENABLE_BINANCE:-true}
      BACKEND_ENABLE_KRAKEN: ${BACKEND_ENABLE_KRAKEN:-true}
      BACKEND_ENABLE_BINANCE_VISION: ${BACKEND_ENABLE_BINANCE_VISION:-true}
      BACKEND_ENABLE_CRYPTODATADOWNLOAD: ${BACKEND_ENABLE_CRYPTODATADOWNLOAD:-true}
      BACKEND_ENABLE_COINGECKO: ${BACKEND_ENABLE_COINGECKO:-true}
      BACKEND_COINGECKO_API_KEY: ${BACKEND_COINGECKO_API_KEY:-}
      BACKEND_PLANNER_LEASE_NAME: ${BACKEND_PLANNER_LEASE_NAME:-planner_leader}
      BACKEND_PLANNER_LEASE_TTL: ${BACKEND_PLANNER_LEASE_TTL:-15s}
      BACKEND_PLANNER_TICK: ${BACKEND_PLANNER_TICK:-1s}
      BACKEND_PLANNER_BACKFILL_BATCH_PERCENT: ${BACKEND_PLANNER_BACKFILL_BATCH_PERCENT:-20}
      BACKEND_WORKER_POLL_INTERVAL: ${BACKEND_WORKER_POLL_INTERVAL:-5s}
      BACKEND_WORKER_BATCH_SIZE: ${BACKEND_WORKER_BATCH_SIZE:-100}
      BACKEND_WORKER_CONCURRENCY: ${BACKEND_WORKER_CONCURRENCY:-4}
      BACKEND_WORKER_BACKFILL_BATCH_PERCENT: ${BACKEND_WORKER_BACKFILL_BATCH_PERCENT:-50}
      BACKEND_DEFAULT_QUOTE_ASSETS: ${BACKEND_DEFAULT_QUOTE_ASSETS:-EUR,USD}
      BACKEND_TASK_RETENTION_PERIOD: ${BACKEND_TASK_RETENTION_PERIOD:-24h}
      BACKEND_TASK_MAX_LOG_COUNT: ${BACKEND_TASK_MAX_LOG_COUNT:-1000}
      BACKEND_REALTIME_POLL_INTERVAL: ${BACKEND_REALTIME_POLL_INTERVAL:-5s}
      BACKEND_TICKER_CACHE_SIZE: ${BACKEND_TICKER_CACHE_SIZE:-100}
      BACKEND_TICKERS_CACHE_TTL: ${BACKEND_TICKERS_CACHE_TTL:-30s}
      BACKEND_AUTH_MODE: ${BACKEND_AUTH_MODE:-}
      BACKEND_GOOGLE_CLIENT_ID: ${BACKEND_GOOGLE_CLIENT_ID:-}
      BACKEND_GOOGLE_CLIENT_SECRET: ${BACKEND_GOOGLE_CLIENT_SECRET:-}
      BACKEND_GOOGLE_REDIRECT_URI: ${BACKEND_GOOGLE_REDIRECT_URI:-http://localhost:8080/api/v1/auth/google/callback}
      BACKEND_JWT_SECRET: ${BACKEND_JWT_SECRET:-}
      BACKEND_JWT_EXPIRY: ${BACKEND_JWT_EXPIRY:-15m}
      BACKEND_REFRESH_TOKEN_EXPIRY: ${BACKEND_REFRESH_TOKEN_EXPIRY:-168h}
      BACKEND_ADMIN_EMAIL: ${BACKEND_ADMIN_EMAIL:-}
      BACKEND_BCRYPT_COST: ${BACKEND_BCRYPT_COST:-12}
      BACKEND_TRUSTED_PROXIES: ${BACKEND_TRUSTED_PROXIES:-}
      BACKEND_RATELIMIT_USER: ${BACKEND_RATELIMIT_USER:-100}
      BACKEND_RATELIMIT_PREMIUM: ${BACKEND_RATELIMIT_PREMIUM:-500}
      BACKEND_RATELIMIT_ADMIN: ${BACKEND_RATELIMIT_ADMIN:-1000}
      BACKEND_RATELIMIT_IP: ${BACKEND_RATELIMIT_IP:-200}
      BACKEND_RATELIMIT_WINDOW: ${BACKEND_RATELIMIT_WINDOW:-1m}
      BACKEND_PORTFOLIO_ENABLED: ${BACKEND_PORTFOLIO_ENABLED:-false}
      BACKEND_PORTFOLIO_ENCRYPTION_KEY: ${BACKEND_PORTFOLIO_ENCRYPTION_KEY:-}
      BACKEND_ETHERSCAN_API_KEY: ${BACKEND_ETHERSCAN_API_KEY:-}
      BACKEND_SOLANA_RPC_URL: ${BACKEND_SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      BACKEND_BITCOIN_API_URL: ${BACKEND_BITCOIN_API_URL:-https://blockstream.info/api}
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: exchangely-frontend
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - node_modules/
            - dist/
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  timescaledb-data:
